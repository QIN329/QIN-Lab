<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QIN LAB</title>


<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/glitch.css">


</head>


<body>


<!-- 开场文字 -->

<div id="intro">

    <div class="love">
        I LOVE
    </div>


    <div class="know">
        I KNOW
    </div>

</div>



<!-- 月球探索界面 -->

<div id="moon">

    <div class="lens">

        <div class="moon-surface">

        </div>

    </div>


    <p>
        LOOK BEYOND
    </p>


</div>





<!-- 星空区域 -->

<div id="space">


    <div class="stars">


        <!-- 北极星 -->

        <div class="star polaris" id="polaris"></div>



        <!-- 小熊座 -->

        <div class="star s1"></div>

        <div class="star s2"></div>

        <div class="star s3"></div>

        <div class="star s4"></div>

        <div class="star s5"></div>

        <div class="star s6"></div>


    </div>





    <!-- 水面波纹 -->

    <div id="wave"></div>






    <!-- glitch窗口 -->


    <div id="errorBox">


        <div class="window">


            <div class="bar">

                QIN.exe

            </div>



            <p>
                SYSTEM ERROR
            </p>


            <p>
                Unknown Memory Found
            </p>



            <button id="recover">

                RECOVER

            </button>


        </div>


    </div>




</div>







<script src="js/intro.js"></script>

<script src="js/wave.js"></script>

<script src="js/stars.js"></script>

<script src="js/glitch.js"></script>

<script src="js/transition.js"></script>



</body>

</html>
