<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QIN LAB</title>


<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/glitch.css">


</head>


<body>


<!-- 星星鼠标 -->

<div id="cursorStar"></div>



<!-- 底部雨滴区域 -->

<div id="rainFloor"></div>



<!-- 中央文字 -->

<div id="intro">


    <div class="love">
        I LOVE
    </div>


    <div class="know">
        I KNOW
    </div>


</div>




<!-- 星空 -->


<div id="space">


    <div class="stars">


        <!-- 北极星 -->

        <div class="star polaris" id="polaris"></div>



        <!-- 小熊座 -->


        <div class="star s1"></div>

        <div class="star s2"></div>

        <div class="star s3"></div>

        <div class="star s4"></div>

        <div class="star s5"></div>

        <div class="star s6"></div>



    </div>


</div>





<!-- 错误窗口 -->


<div id="errorBox">


    <div class="virusWindow">


        <div class="virusTitle">

            QIN.exe

        </div>



        <div class="virusText">

            SYSTEM ERROR

            <br><br>

            UNKNOWN MEMORY FOUND


        </div>


    </div>


</div>





<script src="js/cursor.js"></script>

<script src="js/rain.js"></script>

<script src="js/glitch.js"></script>

<script src="js/stars.js"></script>

<script src="js/transition.js"></script>



</body>


</html>
