<!DOCTYPE html>
<html lang="en">

<head>
    
<meta charset="UTF-8">

<title>Qin Lab</title>


<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {

    background: #0b0b0b;
    color: #f5f1e8;
    font-family: "Times New Roman", serif;
    height: 100vh;
    overflow: hidden;

}


.container {

    height: 100vh;

    display: flex;

    flex-direction: column;

    justify-content: center;

    align-items: center;

}



.word {

    font-size: 80px;

    letter-spacing: 15px;

    opacity: 0;

    animation: appear 2s forwards;

}



.love {

    animation-delay: 1s;

}



.know {

    margin-top: 80px;

    animation-delay: 4s;

}



.logo {

    margin-top: 120px;

    font-size: 35px;

    letter-spacing: 12px;

    opacity: 0;

    animation: appear 2s forwards;

    animation-delay: 7s;

}



.enter {

    margin-top: 60px;

    font-size: 14px;

    letter-spacing: 8px;

    opacity: 0;

    animation: appear 2s forwards;

    animation-delay: 9s;

}



@keyframes appear {


    from {

        opacity: 0;

    }


    to {

        opacity: 1;

    }


}


</style>


</head>



<body>


<div class="container">


    <div class="word love">

        I LOVE

    </div>



    <div class="word know">

        I KNOW

    </div>



    <div class="logo">

        QIN LAB

    </div>



    <div class="enter">

        ENTER

    </div>



</div>


</body>


</html>
