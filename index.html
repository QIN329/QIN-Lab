<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>QIN LAB</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#050505;

    color:#f5f1e8;

    font-family:"Times New Roman", serif;

    height:100vh;

    overflow:hidden;

}



/* 星空 */

.stars{

    position:absolute;

    width:100%;

    height:100%;

}



/* 星星 */

.star{

    position:absolute;

    width:6px;

    height:6px;

    background:#f5f1e8;

    border-radius:50%;

    opacity:0.25;

    cursor:pointer;

    transition:
    opacity 0.6s ease,
    transform 0.6s ease,
    box-shadow 0.6s ease;

}



/* 被发现 */

.star.found{

    opacity:1;

    transform:scale(2);

    box-shadow:

    0 0 20px #f5f1e8,

    0 0 50px #f5f1e8;

}



/* 星星位置 */

.star1{

    left:35%;

    top:40%;

}


.star2{

    left:43%;

    top:33%;

}


.star3{

    left:52%;

    top:30%;

}


.star4{

    left:60%;

    top:38%;

}


.star5{

    left:50%;

    top:48%;

}


.star6{

    left:60%;

    top:55%;

}



/* 北极星 */

.polaris{

    left:52%;

    top:15%;

    width:10px;

    height:10px;

    opacity:0.7;

}





/* 文字 */

.container{

    position:relative;

    z-index:2;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}



.word{

    font-size:80px;

    letter-spacing:15px;

    opacity:0;

    animation:appear 2s forwards;

}



.love{

    animation-delay:1s;

}



.know{

    margin-top:80px;

    animation-delay:4s;

}



.logo{

    margin-top:120px;

    font-size:35px;

    letter-spacing:12px;

    opacity:0;

    animation:appear 2s forwards;

    animation-delay:7s;

}



@keyframes appear{

    from{

        opacity:0;

    }


    to{

        opacity:1;

    }

}


</style>


</head>



<body>


<div class="stars">

    <div class="star star1"></div>

    <div class="star star2"></div>

    <div class="star star3"></div>

    <div class="star star4"></div>

    <div class="star star5"></div>

    <div class="star star6"></div>

    <div class="star polaris"></div>

</div>



<div class="container">


    <div class="word love">

        I LOVE

    </div>



    <div class="word know">

        I KNOW

    </div>



    <div class="logo">

        QIN LAB

    </div>


</div>




<script>


const stars =
document.querySelectorAll(".star");



document.addEventListener(
"mousemove",
(e)=>{


stars.forEach(star=>{


let rect =
star.getBoundingClientRect();



let starX =
rect.left + rect.width/2;



let starY =
rect.top + rect.height/2;



let distance =
Math.sqrt(
(e.clientX-starX)**2 +
(e.clientY-starY)**2
);



if(distance < 150){


let strength =
1 - distance / 150;



star.style.opacity =
0.3 + strength * 0.7;



star.style.transform =
`scale(${1 + strength})`;



star.style.boxShadow =
`
0 0 ${20*strength}px #f5f1e8
`;



}

else if(!star.classList.contains("found")){


star.style.opacity="0.25";

star.style.transform="scale(1)";

star.style.boxShadow="none";


}


});


});




stars.forEach(star=>{


star.addEventListener(
"click",
()=>{


star.classList.add("found");


});


});


</script>


</body>

</html>
