<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>QIN LAB</title>


<style>


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body{


    background:
    radial-gradient(
        circle at center,
        #151515 0%,
        #090909 45%,
        #030303 100%
    );


    color:#f5f1e8;


    font-family:"Times New Roman", serif;


    height:100vh;


    overflow:hidden;


}





/* 星空 */


.stars{


    position:absolute;


    width:100%;


    height:100%;


}





.star{


    position:absolute;


    width: 10px;


    height: 10px;


    background:#f5f1e8;


    border-radius:50%;


    opacity:0.35;


    cursor:pointer;


    transition:all .6s ease;


    animation:twinkle 6s infinite ease-in-out;


}




/* 鼠标靠近 */


.star:hover{

    opacity:1;

    transform:scale(3);

    box-shadow:

    0 0 15px #f5f1e8,

    0 0 35px rgba(245,241,232,0.8),

    0 0 70px rgba(245,241,232,0.4);

}




/* 点击后的状态 */


.star.found{


    opacity:1;


    box-shadow:

    0 0 20px #f5f1e8,

    0 0 60px rgba(245,241,232,.9);


}





/* 小熊座七颗星 */


.star1{
    left:42%;
    top:38%;
}


.star2{
    left:48%;
    top:32%;
}


.star3{
    left:55%;
    top:30%;
}


.star4{
    left:62%;
    top:35%;
}


.star5{
    left:55%;
    top:43%;
}


.star6{
    left:62%;
    top:50%;
}


/* 北极星 */

.polaris{

    left:55%;

    top:15%;


    width:9px;

    height:9px;


    opacity:0.9;


}





/* 星光呼吸 */


@keyframes twinkle{


    0%,100%{


        opacity:.25;

    }



    50%{


        opacity:.55;

    }


}







/* 中央文字 */


.container{


    height:100vh;


    display:flex;


    flex-direction:column;


    justify-content:center;


    align-items:center;


    position:relative;


    z-index:2;


}





.word{


    font-size:80px;


    letter-spacing:15px;


    opacity:0;


    animation:appear 2s forwards;


}





.love{


    animation-delay:1s;


}





.know{


    margin-top:80px;


    animation-delay:4s;


}





.logo{


    margin-top:120px;


    font-size:35px;


    letter-spacing:12px;


    opacity:0;


    animation:appear 2s forwards;


    animation-delay:7s;


}





@keyframes appear{


    from{


        opacity:0;


    }



    to{


        opacity:1;


    }


}



</style>


</head>




<body>



<div class="stars">


<div class="star star1"></div>


<div class="star star2"></div>


<div class="star star3"></div>


<div class="star star4"></div>


<div class="star star5"></div>


<div class="star star6"></div>


<div class="star polaris"></div>



<svg class="constellation">

    <line x1="42%" y1="38%" x2="48%" y2="32%"/>
    <line x1="48%" y1="32%" x2="55%" y2="30%"/>
    <line x1="55%" y1="30%" x2="62%" y2="35%"/>
    <line x1="55%" y1="30%" x2="55%" y2="43%"/>
    <line x1="55%" y1="43%" x2="62%" y2="50%"/>

</svg>


</div>




<div class="container">


<div class="word love">

I LOVE

</div>



<div class="word know">

I KNOW

</div>




<div class="logo">

QIN LAB

</div>



</div>





<script>


const stars = document.querySelectorAll(".star");


stars.forEach(star=>{


    star.addEventListener("click",()=>{


        star.classList.add("found");


    });


});


</script>



</body>


</html>
